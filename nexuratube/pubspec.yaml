name: nexuratube
description: "Advanced Ads-Free Multi-Threaded Video & Audio Downloader and Media Hub."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 1. إدارة الحالة وفصل العمليات (Zero-Crash Architecture)
  flutter_bloc: ^8.1.3       # لإدارة حالة التطبيق بشكل صارم ومنع تعليق الشاشات
  provider: ^6.1.2           # لتمرير البيانات العامة مثل الإعدادات والمظهر في كامل التطبيق

  # 2. واجهة المستخدم المتقدمة والعصرية (UI/UX)
  google_fonts: ^6.2.0       # لجلب خطوط متناسقة وعصرية لواجهة المستخدم
  flutter_spinkit: ^5.2.1    # مؤشرات تحميل انسيابية وعصرية تتناسب مع التصميم الزجاجي

  # 3. محرك الإنترنت والمتصفح المدمج (Advanced Browser)
  flutter_inappwebview: ^6.0.0 # أقوى متصفح مدمج لحقن كود الـ JavaScript واكتشاف روابط الميديا تلقائياً
  dio: ^5.4.1                # محرك طلبات الشبكة الخارق الذي سنبرمج به نظام التحميل متعدد المسارات (Chunks)

  # 4. إدارة الملفات وقاعدة البيانات المؤقتة المحمية
  path_provider: ^2.1.2      # لتحديد مسارات الذاكرة بأمان متوافق من أندرويد 7 إلى 16
  hive: ^2.2.3               # قاعدة بيانات محلية NoSQL سريعة جداً وخفيفة لكاش التنزيلات والإعدادات
  hive_flutter: ^1.1.0       # دمج Hive مع بيئة Flutter
  encrypt: ^5.0.3            # خوارزميات التشفير القوية (AES-256) لقفل الخزنة السرية

  # 5. التحكم بالنظام والأذونات ومشاركة الروابط
  permission_handler: ^11.3.1 # المعالج الذكي لطلب الأذونات وضمان عدم قفلة النظام
  receive_sharing_intent: ^1.4.5 # لاستقبال الروابط مباشرة عند مشاركتها من تطبيقات أخرى (مثل يوتيوب)
  local_auth: ^2.2.0         # التحقق البيومتري (بصمة الإصبع/الوجه) لفتح الخزنة السرية بأمان

  # 6. مشغل الميديا الخارق والإشعارات المستمرة
  just_audio: ^0.9.36        # مشغل الصوتيات الاحترافي فائق التطور والخفة
  audio_service: ^0.18.12    # لربط مشغل الصوتيات بإشعارات النظام الخلفية والتحكم بها من شاشة القفل
  video_player: ^2.8.2       # مشغل الفيديو الأساسي عالي الأداء لفك ترميز صيغ الـ MP4/MKV
  chewie: ^1.7.5             # واجهة مشغل فيديو متطورة تدعم الإيماءات والـ Picture-in-Picture
  flutter_local_notifications: ^17.0.0 # لإنشاء إشعارات التحميل الحية والنسب المئوية المستمرة

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0      # لضمان كتابة كود نظيف ومتوافق مع المعايير القياسية لمنع العيوب

flutter:
  uses-material-design: true
  # سيتم إضافة مسارات الأيقونات أو الصور هنا لاحقاً إذا احتجنا